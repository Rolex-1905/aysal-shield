name: Aysal Shield Security Scan
# Default: Manual execution only (safe mode)
# Uncomment triggers below to enable automated scanning (enterprise mode)

on:
# Recommended for enterprise / production usage
# Uncomment below to enable automatic scans

# push:
#   branches: [main]
# pull_request:
#   branches: [main]
# schedule:
#   - cron: '0 2 * * *'   # nightly at 02:00 UTC

  # 👇 Default safe mode (manual only)
  workflow_dispatch:

env:
  ZAP_VERSION: "2.17.0"
  PYTHON_VERSION: "3.12"

jobs:
  # --------------------------------------------------------------------------
  # Tomcat hardening — fast, no ZAP, runs on every PR
  # --------------------------------------------------------------------------
  tomcat-hardening:
    name: Tomcat Hardening
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Tomcat Hardening
        run: |
          python -m securitytool.cli \
            --target ${{ vars.TARGET_URL }} \
            --tomcat \
            --report-format json,html,csv \
            --output-dir artifacts
        continue-on-error: true

      - name: Upload hardening report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tomcat-hardening-report
          path: artifacts/
          retention-days: 30

  # --------------------------------------------------------------------------
  # DAST scan — quick mode on PRs, deep mode nightly
  # --------------------------------------------------------------------------
  dast-scan:
    name: DAST Scan (${{ github.event_name == 'schedule' && 'deep/nightly' || 'quick/PR' }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Download and extract ZAP
        run: |
          wget -q https://github.com/zaproxy/zaproxy/releases/download/v${ZAP_VERSION}/ZAP_${ZAP_VERSION}_Linux.tar.gz
          tar -xzf ZAP_${ZAP_VERSION}_Linux.tar.gz
          echo "ZAP_HOME=$(pwd)/ZAP_${ZAP_VERSION}" >> $GITHUB_ENV

      - name: Run DAST Scan (quick — PR)
        if: github.event_name != 'schedule'
        run: |
          python -m securitytool.cli \
            --target ${{ vars.TARGET_URL }} \
            --dast \
            --scan-mode quick \
            --threshold High \
            --max-high 0 \
            --report-format json,html,csv \
            --output-dir artifacts
        env:
          TEST_USER: ${{ secrets.TEST_USER }}
          TEST_PASS: ${{ secrets.TEST_PASS }}

      - name: Run DAST Scan (deep — nightly)
        if: github.event_name == 'schedule'
        run: |
          python -m securitytool.cli \
            --target ${{ vars.TARGET_URL }} \
            --tomcat \
            --dast \
            --scan-mode deep \
            --threshold High \
            --max-high 0 \
            --max-medium 3 \
            --max-duration-minutes 60 \
            --report-format json,html,csv \
            --output-dir artifacts
        env:
          TEST_USER: ${{ secrets.TEST_USER }}
          TEST_PASS: ${{ secrets.TEST_PASS }}

      - name: Upload DAST report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dast-scan-report
          path: artifacts/
          retention-days: 30
