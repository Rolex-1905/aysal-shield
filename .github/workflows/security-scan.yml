name: TomcatShield Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install ZAP
        run: |
          wget https://github.com/zaproxy/zaproxy/releases/download/v2.17.0/ZAP_2.17.0_Linux.tar.gz
          tar -xzf ZAP_2.17.0_Linux.tar.gz
          echo "ZAP_PATH=$(pwd)/ZAP_2.17.0/zap.sh" >> $GITHUB_ENV

      - name: Run Tomcat Hardening Scan
        run: |
          python -m securitytool.cli \
            --target ${{ vars.TARGET_URL }} \
            --tomcat \
            --output-dir artifacts
        continue-on-error: true

      - name: Run DAST Scan
        run: |
          python -m securitytool.cli \
            --target ${{ vars.TARGET_URL }} \
            --dast \
            --threshold High \
            --output-dir artifacts
        env:
          TEST_USER: ${{ secrets.TEST_USER }}
          TEST_PASS: ${{ secrets.TEST_PASS }}

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: security-reports
          path: artifacts/
          retention-days: 30